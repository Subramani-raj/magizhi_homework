<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
     <style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

form {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

input:focus {
    outline: none;
    border-color: #4facfe;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #4facfe;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #00c6ff;
}

button:disabled {
    background-color: gray;
    cursor: not-allowed;
}

.error {
    color: red;
    font-size: 14px;
}

.success {
    color: green;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>
<body>
    <center>
    <h2>Regstration</h2>
    <form id="registerForm">
    <label >Username :</label>
    <input type="text" id="username"><br>
    <p id="liveText"></p>
    <p id="usererror" class="error"></p>
    <label>Email:</label>
    <input type="text" id="email"><br>
    <p id="emailerror" class="error"></p>
    <label>Password:</label>
    <input type="password" id="password">
    <p id="passError" class="error"></p><br>
    <button type="submit" id="submitbtn">submit</button>
    <p id="finalMessage"></p>
    </form>
    </center> 
    <script src="registrations.js"></script>
</body>
</html>
